project:
  type: website
  output-dir: _site

website:
  title: "ASM-TMC Chapter"
  description: "American Society of Microbiology – Texas Medical Center Chapter"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: events/index.qmd
        text: Events
      - href: members/index.qmd
        text: Members
      - href: resources/index.qmd
        text: Resources
      - href: blog/index.qmd
        text: Blog
      - href: about.qmd
        text: About
    right:
      - icon: twitter-x
        href: https://x.com/asm_tmc
        aria-label: "X (Twitter)"
      - icon: facebook
        href: https://www.facebook.com/asm.tmc.chapter
        aria-label: "Facebook"
      - icon: instagram
        href: https://instagram.com/asm_tmc
        aria-label: "Instagram"
      - icon: linkedin
        href: https://www.linkedin.com/company/asm-tmc
        aria-label: "LinkedIn"
      - icon: github
        href: https://github.com/JacobKMcPherson/asm-tmc.github.io
        aria-label: "GitHub"
  page-footer:
    left: "Built with [Quarto](https://quarto.org)"
    right: "© 2025 ASM-TMC Chapter"
  search: true

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    smooth-scroll: true
    comments:
      utterances:
        repo: JacobKMcPherson/asm-tmc.github.io
        issue-term: pathname
        theme: github-light
        label: 💬 discussion

execute:
  freeze: auto
